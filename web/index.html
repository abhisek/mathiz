<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236c4ef5'/%3E%3Ctext x='50' y='72' font-size='62' text-anchor='middle' fill='white' font-family='Georgia, serif'%3E%E2%88%91%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mathiz — AI math playground for kids</title>
    <meta
      name="description"
      content="Math adventures for kids in grades 2–5. Every question is AI-crafted for your child — treasure-map games, streaks, and gems. Free to start."
    />
    <meta name="theme-color" content="#6c4ef5" />
    <link rel="canonical" href="https://mathiz.app/" />

    <!-- OpenGraph (WhatsApp, Facebook, LinkedIn, …). Crawlers don't run JS,
         so these static tags are the ONLY ones they see — one set for all
         routes. The card is generated from web/og/card.html. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mathiz" />
    <meta property="og:url" content="https://mathiz.app/" />
    <meta property="og:title" content="Mathiz — math adventures, made just for your child" />
    <meta
      property="og:description"
      content="AI-crafted questions for grades 2–5, played on a treasure map. Free to start."
    />
    <meta property="og:image" content="https://mathiz.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mathiz — math adventures, made just for your child" />

    <!-- X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mathiz — math adventures, made just for your child" />
    <meta
      name="twitter:description"
      content="AI-crafted questions for grades 2–5, played on a treasure map. Free to start."
    />
    <meta name="twitter:image" content="https://mathiz.app/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
